<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CRUD de Usuarios</title>
  <link rel="stylesheet" href="estilo.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

  <header class="banner">
    <div class="banner-texto">
      <h1>CRUD de Usuarios</h1>
    </div>
  </header>

  <main class="contenedor">
    <section class="card-form">
      <h2>Ver Usuarios</h2>
      <form action="/obtenerUsuario" method="get">
        <input type="submit" value="Ver todos" />
      </form>
    </section>

    <section class="card-form">
      <h2>Agregar Usuario</h2>
      <form action="/agregarUsuario" method="post">
        <input type="number" name="id" placeholder="ID del Usuario" required />
        <input type="text" name="nombre" placeholder="Nombre completo" required />
        <input type="submit" value="Agregar" />
      </form>
    </section>

    <section class="card-form">
      <h2>Borrar Usuario</h2>
      <form action="/borrarUsuario" method="post">
        <input type="number" name="id" placeholder="ID del Usuario a borrar" required />
        <input type="submit" value="Eliminar" />
      </form>
    </section>
  </main>

</body>
</html>
